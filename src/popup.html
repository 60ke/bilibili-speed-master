<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 200px;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f4;
        }
        h2 {
            font-size: 16px;
            color: #fb7299;
            margin-top: 0;
            display: flex;
            align-items: center;
        }
        h2 img {
            width: 24px;
            height: 24px;
            margin-right: 8px;
        }
        .info {
            font-size: 12px;
            color: #666;
            line-height: 1.5;
        }
        .shortcuts {
            margin-top: 10px;
            border-top: 1px solid #ddd;
            padding-top: 10px;
        }
        kbd {
            background-color: #eee;
            border-radius: 3px;
            border: 1px solid #b4b4b4;
            box-shadow: 0 1px 1px rgba(0,0,0,.2), 0 2px 0 0 rgba(255,255,255,.7) inset;
            color: #333;
            display: inline-block;
            font-size: .85em;
            font-weight: 700;
            line-height: 1;
            padding: 2px 4px;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <h2><img src="../icons/icon.png"> Speed Master</h2>
    <div class="info">
        Bilibili 增强倍速播放插件。支持最高 16x 倍速及自定义输入。
    </div>
    <div class="shortcuts">
        <div class="info"><b>设置:</b></div>
        <div class="setting-item">
            <label class="info" style="display: flex; align-items: center; margin-bottom: 8px;">
                设定倍速: <input type="number" id="manualSpeed" step="0.1" min="0.1" max="16" style="width: 50px; margin-left: 10px;">
                <span style="font-size: 10px; color: #fb7299; margin-left: 5px;">(精确到 0.1)</span>
            </label>
            <label class="info">
                <input type="checkbox" id="persistSpeed"> 自动记忆倍速
            </label>
        </div>
        <div class="info" style="font-size: 10px; color: #999; margin-top: 2px;">开启后切换视频将保留当前倍速。</div>
    </div>
    <div class="shortcuts">
        <div class="info"><b>快捷键:</b></div>
        <div class="info"><kbd>Shift</kbd> + <kbd>&gt;</kbd> 加速 0.5x</div>
        <div class="info"><kbd>Shift</kbd> + <kbd>&lt;</kbd> 减速 0.5x</div>
        <div class="info"><kbd>R</kbd> 重置倍速</div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
